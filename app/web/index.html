<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Frida</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet" />
</head>
<body>
  <!-- Backdrop mobile sidebar -->
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <!-- ===== Sidebar (gauche) ===== -->
  <aside class="sidebar">
    <div class="side-header">
      <div class="logo">
        <img src="./fridalogo.png" alt="Frida" width="28" height="28" />
      </div>
      <div class="brand-small">Frida</div>
    </div>

    <button id="newChat" class="primary">+ Nouveau chat</button>

    <nav class="threads">
      <ul id="threads">
        <!-- rempli par app.js -->
      </ul>
    </nav>
  </aside>

  <!-- ===== Colonne principale ===== -->
  <div class="main">
    <!-- Top bar -->
    <header class="topbar">
      <button id="btnMenu" class="btn-menu" title="Menu" aria-label="Ouvrir le menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="title"></div>
      <div class="right">
        <button id="btnSettings" class="icon" title="Paramètres">Paramètres</button>
      </div>
    </header>

    <!-- Popover paramètres (flottant) -->
    <div id="panel" class="panel hidden" role="dialog" aria-modal="true" aria-label="Paramètres">
      <h3>Paramètres</h3>

      <label>Température
        <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.4" />
        <span id="temperatureVal">0.4</span>
      </label>

      <label>Top-p
        <input type="range" id="top_p" min="0.1" max="1" step="0.05" value="1" />
        <span id="toppVal">1.0</span>
      </label>

      <label>Max tokens
        <input type="number" id="max_tokens" min="64" max="4096" value="1500" />
      </label>

      <details>
        <summary>Prompt système</summary>
        <textarea id="system" placeholder="(optionnel)"></textarea>
      </details>
    </div>

    <!-- Zone chat -->
    <main class="chat">
      <div id="hero" class="hero"></div>
      <div id="log" class="log"></div>

      <form id="ask" class="ask">
        <textarea id="message" rows="3" placeholder="Écris ton message…"></textarea>
        <button type="button" id="btnWebSearch" class="btn-web-search" title="Recherche web : désactivée">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <button type="submit" class="primary" title="Envoyer">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
